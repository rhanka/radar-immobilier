# Test surcharge: same services as base, no host ports exposed, no UI
# dev container, no maildev UI. Test isolation comes from the per-branch
# `ENV=test-<slug>` compose project name (each branch gets its own
# namespaced volumes). `make clean ENV=test-<slug>` removes them.
#
# Apply with:
#   docker compose -f docker-compose.yml -f docker-compose.test.yml ...

services:
  api:
    image: node:24-bookworm-slim
    working_dir: /workspace
    command: sh -c "npm run test --workspace=api"
    volumes:
      - .:/workspace
      - radar-test-root-node-modules:/workspace/node_modules
      - radar-test-api-node-modules:/workspace/api/node_modules
    environment:
      NODE_ENV: test

volumes:
  radar-test-root-node-modules:
  radar-test-api-node-modules:
