# Base compose stack for `radar-immobilier`.
# Surcharged by docker-compose.dev.yml / .test.yml / .e2e.yml.
# All commands flow through `make` — see Makefile.

name: ${COMPOSE_PROJECT_NAME:-radar-dev}

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-radar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme-dev-only}
      POSTGRES_DB: ${POSTGRES_DB:-radar}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-radar} -d ${POSTGRES_DB:-radar}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [radar]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - minio-data:/data
    networks: [radar]

  obscura:
    build:
      context: ./obscura
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9222/json/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [radar]

  maildev:
    image: maildev/maildev:latest
    environment:
      MAILDEV_SMTP_PORT: 1025
      MAILDEV_WEB_PORT: 1080
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:1080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [radar]

  api:
    # Dev/test run this node image with the repo mounted (see dev/test
    # surcharges). The production image is built from api/Dockerfile in the
    # e2e surcharge and for K8s (BR-04).
    image: node:24-bookworm-slim
    working_dir: /workspace
    # The dev/test api image is node:24 stock — it does NOT ship poppler-utils.
    # The live-scrape worker shells out to `pdftotext` (poppler) to extract the
    # text layer of every PV PDF; without it the worker silently yields empty
    # text → 0 signal. Installing via an `entrypoint` (idempotent, ~2 MB) covers
    # EVERY invocation of this service — `up` (dev hot-reload), `run --rm api …`
    # (which `make worker-live` uses and which REPLACES the command), and `exec`.
    # The production image bakes poppler-utils into api/Dockerfile instead.
    entrypoint:
      - sh
      - -c
      - 'command -v pdftotext >/dev/null 2>&1 || { apt-get update && apt-get install -y --no-install-recommends poppler-utils && rm -rf /var/lib/apt/lists/*; }; exec "$$@"'
      - --
    command: sh -c "npm run dev --workspace=api"
    # Obscura (scraping, BR-07) and maildev (auth mail, BR-09) are NOT on
    # the api critical path yet — they stay standalone services so the api
    # can build/run/test with just postgres + object storage.
    depends_on:
      postgres: { condition: service_healthy }
      minio:    { condition: service_healthy }
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-radar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme-dev-only}
      POSTGRES_DB: ${POSTGRES_DB:-radar}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-fr-par}
      S3_BUCKET: ${S3_BUCKET:-radar-immobilier-raw}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      OBSCURA_CDP_URL: http://obscura:9222
      MAILDEV_SMTP_HOST: maildev
      MAILDEV_SMTP_PORT: 1025
      # LLM provider keys for the ÉV9 chat (read from the host env / .env).
      # Empty by default: the chat mounts and reports "no provider configured"
      # until at least one key is supplied. Never commit real keys.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      COHERE_API_KEY: ${COHERE_API_KEY:-}
    networks: [radar]

networks:
  radar:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
