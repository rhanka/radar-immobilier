# Dev surcharge: expose ports on host, mount sources for hot reload,
# expose Maildev and MinIO consoles. Apply with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml ...
# (the Makefile wraps this).

services:
  postgres:
    ports:
      - "${POSTGRES_HOST_PORT:-5532}:5432"

  minio:
    ports:
      - "${S3_HOST_PORT:-9100}:9000"
      - "${S3_CONSOLE_HOST_PORT:-9101}:9001"

  obscura:
    ports:
      - "${OBSCURA_HOST_PORT:-9222}:9222"

  maildev:
    ports:
      - "${MAILDEV_UI_PORT:-1080}:1080"
      - "${MAILDEV_SMTP_HOST_PORT:-1025}:1025"

  api:
    # Dev runs the full repo mounted (so npm install writes the lockfile
    # back to host) while node_modules live in named volumes off-host
    # (rules: no node_modules on host). Hot reload via tsx watch.
    image: node:24-bookworm-slim
    command: sh -c "npm run dev --workspace=api"
    ports:
      - "${API_PORT:-8803}:3000"
    volumes:
      - .:/workspace
      - radar-root-node-modules:/workspace/node_modules
      - radar-api-node-modules:/workspace/api/node_modules
    environment:
      NODE_ENV: development
      # Reconciliation studio WRITE gate (write-core). Empty by default ⇒ the
      # POST /api/ontology/:city/patch route is fail-closed (every patch → 401).
      # Set RADAR_ONTOLOGY_WRITE_TOKEN in .env (matching the UI's
      # VITE_RADAR_ONTOLOGY_WRITE_TOKEN below) to enable accept / reject /
      # set_status on the running dev stack.
      RADAR_ONTOLOGY_WRITE_TOKEN: ${RADAR_ONTOLOGY_WRITE_TOKEN:-}

  ui:
    image: node:24-bookworm-slim
    command: sh -c "npm run dev --workspace=ui"
    working_dir: /workspace
    depends_on:
      api: { condition: service_started }
    ports:
      - "${UI_PORT:-5303}:5173"
    volumes:
      - .:/workspace
      - radar-root-node-modules:/workspace/node_modules
      - radar-ui-node-modules:/workspace/ui/node_modules
    environment:
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://api:3000}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
      # Studio write token surfaced to the browser bundle (Vite inlines VITE_*).
      # Must equal the api's RADAR_ONTOLOGY_WRITE_TOKEN above for accept/reject to
      # work on 5301. Empty ⇒ the studio runs read-only (affordances disabled).
      VITE_RADAR_ONTOLOGY_WRITE_TOKEN: ${RADAR_ONTOLOGY_WRITE_TOKEN:-}
    networks: [radar]

volumes:
  radar-root-node-modules:
  radar-api-node-modules:
  radar-ui-node-modules:
