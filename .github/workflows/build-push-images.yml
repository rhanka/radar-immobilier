name: Build & push images

# Builds the production api + ui images on GitHub-hosted runners and pushes them
# to the Scaleway registry, so the local box (which hosts the k8s demo + agents)
# no longer has to carry the heavy `docker build`. This is the CI counterpart of
# the Makefile `build-images` / `push-images` targets (deploy/k8s/README.md step 2:
# "CI does this on the live path").
#
# Deploy (CD) is wired below in the `deploy` job, but ONLY on pushes to `main`
# (never on PRs / feature branches). It rolls the live Scaleway Kapsule cluster
# with `kubectl set image` against the same short-sha tag the build just pushed.
#
# Auth uses the `KUBE_CONFIG_DATA` gh secret (same pattern as rhanka/surch
# ci-k8s.yml): a kubeconfig (base64 OR raw) for a NAMESPACE-SCOPED ServiceAccount
# `radar-ci-deployer` that can only get/list/patch/update Deployments (+ read
# pods/replicasets for `rollout status`) inside the `radar-immobilier` namespace —
# it cannot read Secrets or touch any other namespace. There is no GitOps
# controller (Argo/Flux) on this cluster, so `kubectl set image` is not reverted.
#
# To roll back or deploy by hand, the same commands still work with a full
# kubeconfig:
#   kubectl -n radar-immobilier set image deploy/radar-api  api=rg.fr-par.scw.cloud/radar-immobilier/radar-api:<sha>
#   kubectl -n radar-immobilier set image deploy/radar-ui   ui=rg.fr-par.scw.cloud/radar-immobilier/radar-ui:<sha>
#   kubectl -n radar-immobilier rollout status deploy/radar-api deploy/radar-ui

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra image tag to push alongside the commit sha (optional; e.g. main-pdfgeo)"
        required: false
        type: string

concurrency:
  # Cancel superseded builds on the same ref (a newer push to main / re-dispatch
  # makes the in-flight build redundant).
  group: build-push-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: rg.fr-par.scw.cloud
  IMAGE_PREFIX: rg.fr-par.scw.cloud/radar-immobilier

jobs:
  build-push:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            image: radar-api
            dockerfile: api/Dockerfile
          - service: ui
            image: radar-ui
            dockerfile: ui/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Short SHA
        id: vars
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Scaleway container registry convention: docker login with username
      # `nologin` and the SCW *secret key* as the password (same secret the
      # `scw registry login` CLI uses). Registry host is rg.fr-par.scw.cloud;
      # the project namespace (/radar-immobilier) is part of the image path.
      - name: Login to Scaleway registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Image tags
        id: tags
        run: |
          {
            echo "tags<<EOF"
            echo "${IMAGE_PREFIX}/${{ matrix.image }}:${{ steps.vars.outputs.sha }}"
            echo "${IMAGE_PREFIX}/${{ matrix.image }}:latest"
            if [ -n "${{ inputs.tag }}" ]; then
              echo "${IMAGE_PREFIX}/${{ matrix.image }}:${{ inputs.tag }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # Build context is the repo ROOT (the SPA / API import the @radar/* workspace
      # packages — see api/Dockerfile & ui/Dockerfile comments and docker-compose.e2e.yml).
      #
      # Cache: GitHub Actions cache (type=gha), scoped per service. Both Dockerfiles
      # COPY the package manifests and run `npm install` BEFORE COPYing the sources,
      # so the (heavy) install layer is cached and reused as long as the manifests are
      # unchanged; only the source + `vite build` / esbuild bundle layer re-runs when
      # the source changes. The cache key is bound to the layer contents (Dockerfile
      # ordering), so a stale bundle is impossible BY CONSTRUCTION — no global --no-cache.
      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      - name: Summary
        run: |
          {
            echo "### Pushed \`${{ matrix.image }}\`"
            echo ""
            echo '```'
            echo "${{ steps.tags.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy to cluster
    needs: build-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only roll the live cluster on pushes to main. PRs / feature-branch
    # dispatches build & push images but never deploy.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    env:
      NAMESPACE: radar-immobilier
    steps:
      - name: Short SHA
        id: vars
        # Same short-sha the build job tags with (GITHUB_SHA::7), so the deploy
        # always targets the image this run just pushed.
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          mkdir -p "$HOME/.kube"
          # Accept the secret in either raw YAML or base64-encoded form.
          if printf '%s' "$KUBE_CONFIG_DATA" | base64 -d 2>/dev/null | grep -q '^apiVersion:'; then
            printf '%s' "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config"
          else
            printf '%s' "$KUBE_CONFIG_DATA" > "$HOME/.kube/config"
          fi
          chmod 600 "$HOME/.kube/config"
          # Scoped SA can read deployments in this namespace; fail fast if not.
          kubectl -n "$NAMESPACE" get deploy radar-api radar-ui >/dev/null

      - name: Roll deployments to pushed sha
        env:
          SHA: ${{ steps.vars.outputs.sha }}
        run: |
          set -eu
          kubectl -n "$NAMESPACE" set image deploy/radar-api \
            api="${IMAGE_PREFIX}/radar-api:${SHA}"
          kubectl -n "$NAMESPACE" set image deploy/radar-ui \
            ui="${IMAGE_PREFIX}/radar-ui:${SHA}"

      - name: Wait for rollouts
        run: |
          set -eu
          kubectl -n "$NAMESPACE" rollout status deploy/radar-api --timeout=180s
          kubectl -n "$NAMESPACE" rollout status deploy/radar-ui  --timeout=180s

      - name: Summary
        if: always()
        run: |
          SHA="${{ steps.vars.outputs.sha }}"
          {
            echo "### Deployed to \`${NAMESPACE}\`"
            echo ""
            echo '```'
            echo "deploy/radar-api -> ${IMAGE_PREFIX}/radar-api:${SHA}"
            echo "deploy/radar-ui  -> ${IMAGE_PREFIX}/radar-ui:${SHA}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
