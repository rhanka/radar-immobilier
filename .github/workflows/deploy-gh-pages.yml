name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  pages_preflight:
    name: Check Pages availability
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      pages_enabled: ${{ steps.pages.outputs.enabled }}
    steps:
      - name: Check repository Pages status
        id: pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          http_code="$(curl -L -sS -o /tmp/pages.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages")"

          if [ "$http_code" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$http_code" = "404" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::GitHub Pages is not enabled or unavailable for this repository plan; skipping deploy."
            exit 0
          fi

          cat /tmp/pages.json
          echo "::error::Unexpected GitHub Pages API response: ${http_code}"
          exit 1

  deploy:
    name: Build and deploy UI
    needs: pages_preflight
    if: needs.pages_preflight.outputs.pages_enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install workspace deps
        run: make install ENV=gh-pages

      - name: Build static UI
        run: make build GITHUB_PAGES=true ENV=gh-pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ui/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
