name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose files
        run: |
          docker compose -f docker-compose.yml -f docker-compose.dev.yml config -q
          docker compose -f docker-compose.yml -f docker-compose.test.yml config -q
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml config -q

      - name: Install workspace deps
        run: make install ENV=ci

      - name: Typecheck
        run: make typecheck ENV=ci

      - name: Lint
        run: make lint ENV=ci

      - name: Build
        run: make build ENV=ci

      - name: Test (unit + integration, boots postgres + minio)
        run: make test ENV=test-ci

      - name: Tear down
        if: always()
        run: make clean ENV=test-ci
