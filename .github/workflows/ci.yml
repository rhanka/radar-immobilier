name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: ${{ runner.os }}-buildx-

      - name: Boot stack (postgres + minio + obscura + maildev)
        env:
          ENV: ci
        run: make dev ENV=ci

      - name: Typecheck
        env:
          ENV: ci
        run: make typecheck ENV=ci

      - name: Lint
        env:
          ENV: ci
        run: make lint ENV=ci

      - name: Test
        env:
          ENV: test-ci
        run: make test ENV=test-ci

      - name: Build
        env:
          ENV: ci
        run: make build ENV=ci

      - name: Tear down
        if: always()
        env:
          ENV: ci
        run: make clean ENV=ci
