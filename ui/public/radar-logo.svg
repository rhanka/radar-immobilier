<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Radar">
  <!--
    Marque Radar : carré arrondi (couleur d'action primaire du thème DS
    sent-tech, oklch resolue) + glyphe « Radio » Lucide (parité 1:1 avec
    l'ancien snippet logo maison). Asset statique consommé par AppHeader via
    `logoSrc` → bloc marque CANONIQUE `st-appHeader__brand` (zéro CSS maison).
  -->
  <rect width="32" height="32" rx="6" fill="oklch(50% 0.134 242.749)"/>
  <g transform="translate(4 4)" fill="none" stroke="#ffffff" stroke-width="2.25"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M16.247 7.761a6 6 0 0 1 0 8.478"/>
    <path d="M19.075 4.933a10 10 0 0 1 0 14.134"/>
    <path d="M4.925 19.067a10 10 0 0 1 0-14.134"/>
    <path d="M7.753 16.239a6 6 0 0 1 0-8.478"/>
    <circle cx="12" cy="12" r="2"/>
  </g>
</svg>
