# Default nginx conf baked into the radar-ui image.
#
# In K8s the radar-ui-nginx ConfigMap (deploy/k8s/50-ui.yaml) is mounted over
# /etc/nginx/conf.d and WINS — there the `radar-api` Service DNS always exists,
# so that conf can `proxy_pass http://radar-api:3000` directly.
#
# This baked copy is what runs standalone (compose / e2e / `docker run`), where
# the api may be absent or slow to come up. So it resolves the upstream LAZILY
# (via a `resolver` + a variable proxy_pass) instead of at config-parse time —
# otherwise nginx aborts on boot with "host not found in upstream" and the
# container crashloops. The behaviour for a live api is identical.
server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Docker's embedded DNS (compose) / the cluster DNS; `valid` keeps it fresh
  # so a restarted api is picked up without reloading nginx.
  resolver 127.0.0.11 ipv6=off valid=10s;
  set $radar_api "radar-api:3000";
  set $geo_api "geo-api.geo.svc.cluster.local";

  # SPA history fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Same-origin API proxy to the radar api Service (incl. the sentropic
  # OIDC callback /api/v1/auth/oauth/callback handled by the api RP glue).
  # The variable upstream forces per-request resolution (no boot-time crash).
  # Same-origin proxy to geo OGC API for immo consumers.
  # Only /api/geo/collections is owned by geo-api; radar-api owns the
  # application-specific /api/geo/:city/zones routes.
  location /api/geo/collections {
    rewrite ^/api/geo/(.*)$ /$1 break;
    proxy_pass http://$geo_api;
    proxy_set_header Host api.geo.sent-tech.ca;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/geo/ {
    proxy_pass http://$radar_api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    proxy_pass http://$radar_api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /health {
    proxy_pass http://$radar_api/health;
  }
}
