# Maildev SMTP sink for radar (auth/notification mail in the POC; BR-09).
# Brought in from draft PR #8 (deploy/k8s/maildev.yaml).
#
# Like sentropic (which does NOT deploy maildev and instead uses Scaleway TEM),
# this is a POC convenience: human login itself is delegated to the sentropic
# IdP (which owns magic-link mail), so radar's own outbound mail is minimal.
# Swap MAILDEV_SMTP_HOST in 30-api.yaml for SCW TEM when leaving the POC.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: radar-maildev
  namespace: radar-immobilier
  labels:
    app.kubernetes.io/name: radar-immobilier
    app.kubernetes.io/part-of: sentropic
    app.kubernetes.io/component: maildev
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: radar-immobilier
      app.kubernetes.io/component: maildev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: radar-immobilier
        app.kubernetes.io/part-of: sentropic
        app.kubernetes.io/component: maildev
    spec:
      serviceAccountName: radar-app
      containers:
        - name: maildev
          image: maildev/maildev:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: smtp
              containerPort: 1025
            - name: http
              containerPort: 1080
          env:
            - name: MAILDEV_SMTP_PORT
              value: "1025"
            - name: MAILDEV_WEB_PORT
              value: "1080"
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits: { cpu: 100m, memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: radar-maildev
  namespace: radar-immobilier
  labels:
    app.kubernetes.io/name: radar-immobilier
    app.kubernetes.io/part-of: sentropic
    app.kubernetes.io/component: maildev
spec:
  selector:
    app.kubernetes.io/name: radar-immobilier
    app.kubernetes.io/component: maildev
  ports:
    - name: smtp
      port: 1025
      targetPort: smtp
    - name: http
      port: 1080
      targetPort: http
