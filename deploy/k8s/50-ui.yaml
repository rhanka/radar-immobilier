# radar UI (Svelte SPA, built with `vite build` -> static dist/) served by
# nginx, which also reverse-proxies /api -> radar-api:3000 so the browser stays
# same-origin (no CORS) — mirrors sentropic's deploy/k8s/40-ui.yaml, where the
# nginx baked into the ui image proxies /api -> api:8787.
#
# Two delivery options for the static bundle:
#   (A) [default here] a dedicated `radar-ui` image with the SPA + this nginx
#       conf baked in, built/pushed by CI (analogous to sentropic-ui). Until
#       that image exists, see option B.
#   (B) a stock nginx image with this ConfigMap mounted as the conf and the
#       built dist/ delivered via an initContainer/volume. The ConfigMap below
#       holds the proxy config so either option is one small change away.
#
# The SPA is built with `VITE_API_BASE_URL` empty so it calls same-origin
# /api/* (Makefile default), which nginx forwards to the api Service.
apiVersion: v1
kind: ConfigMap
metadata:
  name: radar-ui-nginx
  namespace: radar-immobilier
  labels:
    app.kubernetes.io/name: radar-immobilier
    app.kubernetes.io/part-of: sentropic
    app.kubernetes.io/component: ui
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;

      # SPA history fallback.
      location / {
        try_files $uri $uri/ /index.html;
      }

      # Same-origin API proxy to the radar api Service (incl. the sentropic
      # OIDC callback /api/v1/auth/oauth/callback handled by the api RP glue).
      location /api/ {
        proxy_pass http://radar-api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location = /health {
        proxy_pass http://radar-api:3000/health;
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: radar-ui
  namespace: radar-immobilier
  labels:
    app.kubernetes.io/name: radar-immobilier
    app.kubernetes.io/part-of: sentropic
    app.kubernetes.io/component: ui
spec:
  selector:
    app.kubernetes.io/name: radar-immobilier
    app.kubernetes.io/component: ui
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: radar-ui
  namespace: radar-immobilier
  labels:
    app.kubernetes.io/name: radar-immobilier
    app.kubernetes.io/part-of: sentropic
    app.kubernetes.io/component: ui
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: radar-immobilier
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: radar-immobilier
        app.kubernetes.io/part-of: sentropic
        app.kubernetes.io/component: ui
    spec:
      serviceAccountName: radar-app
      containers:
        - name: ui
          # Option A target: rg.fr-par.scw.cloud/radar-immobilier/radar-ui:latest
          # (SPA + nginx baked in, built by CI). Until that image exists this
          # stock nginx + mounted conf serves the static bundle (option B).
          image: nginxinc/nginx-unprivileged:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests: { cpu: 30m, memory: 64Mi }
            limits: { cpu: 100m, memory: 128Mi }
      volumes:
        - name: nginx-conf
          configMap:
            name: radar-ui-nginx
