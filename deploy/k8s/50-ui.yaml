# radar UI (Svelte SPA, built with `vite build` -> static dist/) served by
# nginx, which also reverse-proxies /api -> radar-api:3000 so the browser stays
# same-origin (no CORS) — mirrors sentropic's deploy/k8s/40-ui.yaml, where the
# nginx baked into the ui image proxies /api -> api:8787.
#
# Delivery (option A, in effect): a dedicated `radar-ui` image (ui/Dockerfile,
# multi-stage `vite build` + unprivileged nginx) ships the SPA at
# /usr/share/nginx/html AND a baked default.conf. The stock-nginx-only approach
# served NO bundle (empty html root → blank page); this image fixes that.
#
# This ConfigMap is mounted over /etc/nginx/conf.d and WINS in-cluster, so it
# is the authoritative proxy conf here: ops can tune it without rebuilding the
# image. It can `proxy_pass http://radar-api:3000` directly because the
# `radar-api` Service DNS always exists in the namespace. (The image's baked
# default.conf resolves the upstream lazily instead, so the container also
# boots standalone where the api may be absent — see ui/nginx/default.conf.)
#
# The SPA is built with `VITE_API_BASE_URL` empty so it calls same-origin
# /api/* (Makefile default), which nginx forwards to the api Service.
apiVersion: v1
kind: ConfigMap
metadata:
  name: radar-ui-nginx
  namespace: radar-immobilier
  labels:
    app.kubernetes.io/name: radar-immobilier
    app.kubernetes.io/part-of: sentropic
    app.kubernetes.io/component: ui
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;

      # ── AS-IS PRIVATE PREVIEW: BasicAuth at the edge ───────────────────────
      # The platform Traefik runs with --providers.kubernetesingress only (no
      # CRD provider), so a Traefik BasicAuth Middleware is not available. The
      # nginx baked into this UI pod is the first hop we control after Traefik's
      # TLS termination, so we gate the whole origin (SPA + /api proxy) here with
      # HTTP Basic auth backed by a k8s Secret (radar-edge-basicauth, an htpasswd
      # file mounted read-only at /etc/nginx/auth/htpasswd, never committed). The
      # Let's Encrypt cert is unaffected (Traefik still terminates TLS upstream).
      # This keeps the as-is url private while the OIDC RP is being wired.
      auth_basic "radar-immobilier (private preview)";
      auth_basic_user_file /etc/nginx/auth/htpasswd;

      # k8s liveness/readiness probe target — NO auth (probes send no creds and
      # would otherwise 401-kill the pod). Internal-only 200, not the SPA.
      location = /healthz {
        auth_basic off;
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
      }

      # SPA history fallback (BasicAuth inherited from the server block).
      location / {
        try_files $uri $uri/ /index.html;
      }

      # Same-origin API proxy to the radar api Service (incl. the sentropic
      # OIDC callback /api/v1/auth/oauth/callback handled by the api RP glue).
      # BasicAuth inherited from the server block gates every /api/* call too.
      location /api/ {
        proxy_pass http://radar-api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location = /health {
        proxy_pass http://radar-api:3000/health;
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: radar-ui
  namespace: radar-immobilier
  labels:
    app.kubernetes.io/name: radar-immobilier
    app.kubernetes.io/part-of: sentropic
    app.kubernetes.io/component: ui
spec:
  selector:
    app.kubernetes.io/name: radar-immobilier
    app.kubernetes.io/component: ui
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: radar-ui
  namespace: radar-immobilier
  labels:
    app.kubernetes.io/name: radar-immobilier
    app.kubernetes.io/part-of: sentropic
    app.kubernetes.io/component: ui
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: radar-immobilier
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: radar-immobilier
        app.kubernetes.io/part-of: sentropic
        app.kubernetes.io/component: ui
    spec:
      serviceAccountName: radar-app
      containers:
        - name: ui
          # radar-ui image (ui/Dockerfile): SPA bundle + nginx baked in, built
          # and pushed by CI to the SCW registry. This is the image that
          # actually serves the static SPA (the previous stock-nginx image had
          # an empty html root and served a blank page).
          image: rg.fr-par.scw.cloud/radar-immobilier/radar-ui:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
            # htpasswd for the edge BasicAuth (radar-edge-basicauth Secret).
            # Mounted read-only; the file is referenced by auth_basic_user_file.
            - name: edge-basicauth
              mountPath: /etc/nginx/auth
              readOnly: true
          # Probes hit /healthz (auth_basic off) so the BasicAuth gate on /
          # does not 401-kill the pod.
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests: { cpu: 30m, memory: 64Mi }
            limits: { cpu: 100m, memory: 128Mi }
      volumes:
        - name: nginx-conf
          configMap:
            name: radar-ui-nginx
        - name: edge-basicauth
          secret:
            secretName: radar-edge-basicauth
            items:
              - key: htpasswd
                path: htpasswd
