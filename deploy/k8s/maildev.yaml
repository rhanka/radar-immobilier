apiVersion: apps/v1
kind: Deployment
metadata:
  name: radar-maildev
  labels:
    app.kubernetes.io/name: radar-immobilier
    app.kubernetes.io/component: maildev
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: radar-immobilier
      app.kubernetes.io/component: maildev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: radar-immobilier
        app.kubernetes.io/component: maildev
    spec:
      containers:
        - name: maildev
          image: maildev/maildev:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: smtp
              containerPort: 1025
            - name: http
              containerPort: 1080
          env:
            - name: MAILDEV_SMTP_PORT
              value: "1025"
            - name: MAILDEV_WEB_PORT
              value: "1080"
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits: { cpu: 100m, memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: radar-maildev
  labels:
    app.kubernetes.io/name: radar-immobilier
    app.kubernetes.io/component: maildev
spec:
  selector:
    app.kubernetes.io/name: radar-immobilier
    app.kubernetes.io/component: maildev
  ports:
    - name: smtp
      port: 1025
      targetPort: smtp
    - name: http
      port: 1080
      targetPort: http
