# refresh-cronjob.yaml — RAFRAÎCHISSEMENT PÉRIODIQUE du pipeline DÉTERMINISTE.
#
# Deux CronJobs distincts, deux cadences (cf. brainstorm §4.1 « 3 régimes »
# et SPEC_PERSISTENCE_S3_FIRST §6 « SCW Serverless Jobs + Cron quotidien ») :
#
#   A. radar-refresh-scrape  (QUOTIDIEN, 03:17 UTC)
#      scrape + parse + exploit déterministe des 549 villes → raw/ parsed/
#      ontology/ sur SCW. AUCUN LLM. HEAD-skip CAS → ne capte que le NOUVEAU.
#      C'est le moteur du « refresh des nouveaux PV tout seul » de la Vague A.
#
#   B. radar-refresh-projection  (QUOTIDIEN, 04:30 UTC, APRÈS le scrape)
#      projette graph/<ville>/latest.json (SCW) → PG. Idempotent (upsert ON
#      CONFLICT). Rattrape en PG tout graphe re-graphifié hors-bande depuis la
#      veille. NE migre PAS (schéma supposé à jour ; reset DB → passer d'abord
#      par 31-graph-projection-job.yaml une fois).
#
# NB cadences DÉCOUPLÉES volontairement : le scrape (déterministe, gratuit) peut
# tourner tous les jours ; la projection suit le scrape. Le graphify (agentique,
# coûteux, saturable) N'EST PAS ici — il reste piloté à la main en Vague A et
# passera en file agentique en Vague B. Bien séparer les cadences = clé de
# l'anti-saturation (brainstorm §4.1).
#
# Observabilité : chaque run laisse ses logs (logs jalons "worker-live: done"
# new/seen/errors ; "project-graph-from-s3: terminé" ok/skipped/errors) +
# successfulJobsHistoryLimit/failedJobsHistoryLimit pour inspection a posteriori.
#
# Budget mémoire tenant serré (cf. 31-graph-projection-job.yaml) :
# requests 96Mi/50m, limits 256Mi/150m, NODE_OPTIONS=--max-old-space-size=200.
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: radar-refresh-scrape
  namespace: radar-immobilier
  labels:
    app.kubernetes.io/name: radar-immobilier
    app.kubernetes.io/part-of: sentropic
    app.kubernetes.io/component: scrape
spec:
  # Quotidien 03:17 UTC (heure creuse ; minute décalée pour éviter le top-heure).
  schedule: "17 3 * * *"
  timeZone: "Etc/UTC"
  # Jamais deux scrapes en parallèle (politeness + budget mémoire).
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 7200
      template:
        metadata:
          labels:
            app.kubernetes.io/name: radar-immobilier
            app.kubernetes.io/component: scrape
        spec:
          restartPolicy: Never
          serviceAccountName: radar-app
          containers:
            - name: scrape
              image: rg.fr-par.scw.cloud/radar-immobilier/radar-api:latest
              imagePullPolicy: Always
              workingDir: /workspace/api
              command: ["node", "dist/scripts/worker-live.js"]
              envFrom:
                - configMapRef:
                    name: radar-api
              env:
                - name: NODE_OPTIONS
                  value: "--max-old-space-size=200 --dns-result-order=ipv4first"
                - name: LIVE_SCRAPE_EXPLOIT
                  value: "1"
                - name: S3_ACCESS_KEY
                  valueFrom: { secretKeyRef: { name: radar-s3-credentials, key: S3_ACCESS_KEY } }
                - name: S3_SECRET_KEY
                  valueFrom: { secretKeyRef: { name: radar-s3-credentials, key: S3_SECRET_KEY } }
                - name: SCRAPE_S3_ENDPOINT
                  valueFrom: { secretKeyRef: { name: radar-scrape-s3-credentials, key: SCRAPE_S3_ENDPOINT, optional: true } }
                - name: SCRAPE_S3_BUCKET
                  valueFrom: { secretKeyRef: { name: radar-scrape-s3-credentials, key: SCRAPE_S3_BUCKET, optional: true } }
                - name: SCRAPE_S3_REGION
                  valueFrom: { secretKeyRef: { name: radar-scrape-s3-credentials, key: SCRAPE_S3_REGION, optional: true } }
                - name: SCRAPE_S3_ACCESS_KEY
                  valueFrom: { secretKeyRef: { name: radar-scrape-s3-credentials, key: SCRAPE_S3_ACCESS_KEY, optional: true } }
                - name: SCRAPE_S3_SECRET_KEY
                  valueFrom: { secretKeyRef: { name: radar-scrape-s3-credentials, key: SCRAPE_S3_SECRET_KEY, optional: true } }
                - name: SCRAPE_S3_FORCE_PATH_STYLE
                  value: "false"
              resources:
                requests: { cpu: 50m, memory: 96Mi }
                limits: { cpu: 150m, memory: 256Mi }
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: radar-refresh-projection
  namespace: radar-immobilier
  labels:
    app.kubernetes.io/name: radar-immobilier
    app.kubernetes.io/part-of: sentropic
    app.kubernetes.io/component: graph-projection
spec:
  # Quotidien 04:30 UTC, ~1 h après le scrape (laisse le scrape finir).
  schedule: "30 4 * * *"
  timeZone: "Etc/UTC"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # backoffLimit: 1 → 1 retry (au lieu de 0) pour absorber un aléa réseau S3/PG
      # transitoire. NB : le script lui-même exit !=0 si des villes sont abortées
      # (régression de preuves) ou si des upserts ont échoué (cf.
      # project-graph-from-s3.ts), ce qui rend l'échec visible dans
      # failedJobsHistoryLimit + les logs jalons "project-graph-from-s3: terminé".
      backoffLimit: 1
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app.kubernetes.io/name: radar-immobilier
            app.kubernetes.io/component: graph-projection
        spec:
          restartPolicy: Never
          serviceAccountName: radar-app
          containers:
            - name: project-graph
              image: rg.fr-par.scw.cloud/radar-immobilier/radar-api:latest
              imagePullPolicy: Always
              workingDir: /workspace/api
              command: ["node", "dist/scripts/project-graph-from-s3.js"]
              envFrom:
                - configMapRef:
                    name: radar-api
              env:
                - name: NODE_OPTIONS
                  value: "--max-old-space-size=200 --dns-result-order=ipv4first"
                - name: POSTGRES_USER
                  valueFrom: { secretKeyRef: { name: radar-db-credentials, key: POSTGRES_USER } }
                - name: POSTGRES_PASSWORD
                  valueFrom: { secretKeyRef: { name: radar-db-credentials, key: POSTGRES_PASSWORD } }
                - name: POSTGRES_DB
                  valueFrom: { secretKeyRef: { name: radar-db-credentials, key: POSTGRES_DB } }
                - name: S3_ACCESS_KEY
                  valueFrom: { secretKeyRef: { name: radar-s3-credentials, key: S3_ACCESS_KEY } }
                - name: S3_SECRET_KEY
                  valueFrom: { secretKeyRef: { name: radar-s3-credentials, key: S3_SECRET_KEY } }
                # ── Store de graphes EXPLICITE (GRAPH_S3_*) ───────────────────
                # Garantit le bon bucket SCW (radar-immobilier-docs-pocs)
                # INDÉPENDAMMENT du secret radar-scrape-s3-credentials, absent en
                # prod (sa disparition faisait tomber resolveGraphS3Config sur
                # S3_ENDPOINT=radar-minio + bucket "radar-immobilier-docs" →
                # ENOTFOUND, projection gelée). GRAPH_S3_* a priorité sur
                # SCRAPE_S3_*/S3_* dans resolveGraphS3Config (config.ts).
                - name: GRAPH_S3_ENDPOINT
                  value: "https://s3.fr-par.scw.cloud"
                - name: GRAPH_S3_BUCKET
                  value: "radar-immobilier-docs-pocs"
                - name: GRAPH_S3_REGION
                  value: "fr-par"
                - name: GRAPH_S3_FORCE_PATH_STYLE
                  value: "false"
                - name: GRAPH_S3_ACCESS_KEY
                  valueFrom: { secretKeyRef: { name: radar-s3-credentials, key: S3_ACCESS_KEY } }
                - name: GRAPH_S3_SECRET_KEY
                  valueFrom: { secretKeyRef: { name: radar-s3-credentials, key: S3_SECRET_KEY } }
                # Bloc SCRAPE_S3_* conservé (optional:true → ne gêne pas ; sert de
                # repli quand GRAPH_S3_* ne serait pas fourni). Sans effet ici.
                - name: SCRAPE_S3_ENDPOINT
                  valueFrom: { secretKeyRef: { name: radar-scrape-s3-credentials, key: SCRAPE_S3_ENDPOINT, optional: true } }
                - name: SCRAPE_S3_BUCKET
                  valueFrom: { secretKeyRef: { name: radar-scrape-s3-credentials, key: SCRAPE_S3_BUCKET, optional: true } }
                - name: SCRAPE_S3_REGION
                  valueFrom: { secretKeyRef: { name: radar-scrape-s3-credentials, key: SCRAPE_S3_REGION, optional: true } }
                - name: SCRAPE_S3_ACCESS_KEY
                  valueFrom: { secretKeyRef: { name: radar-scrape-s3-credentials, key: SCRAPE_S3_ACCESS_KEY, optional: true } }
                - name: SCRAPE_S3_SECRET_KEY
                  valueFrom: { secretKeyRef: { name: radar-scrape-s3-credentials, key: SCRAPE_S3_SECRET_KEY, optional: true } }
                - name: SCRAPE_S3_FORCE_PATH_STYLE
                  value: "false"
              resources:
                requests: { cpu: 50m, memory: 96Mi }
                limits: { cpu: 150m, memory: 256Mi }
