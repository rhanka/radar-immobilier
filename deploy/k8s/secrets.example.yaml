# EXAMPLE secrets ONLY — never commit real values. Copy to a private file (or
# create the Secrets imperatively / via SealedSecrets) and fill in real values
# out-of-band. Based on draft PR #8 (deploy/k8s/secrets.example.yaml), extended
# with the radar-sentropic-auth Secret for the OIDC RP delegation.
#
# On the live cluster, prefer Bitnami SealedSecrets (the sentropic tenant uses
# them — see ~/src/sentropic/deploy/k8s/README.md "Sealed Secrets") or
# `make k8s-create-secrets` so plaintext never lands in git.
apiVersion: v1
kind: Secret
metadata:
  name: radar-db-credentials
  namespace: radar-immobilier
type: Opaque
stringData:
  POSTGRES_USER: radar
  POSTGRES_PASSWORD: replace-me
  POSTGRES_DB: radar
---
apiVersion: v1
kind: Secret
metadata:
  name: radar-s3-credentials
  namespace: radar-immobilier
type: Opaque
stringData:
  # Also used as the in-cluster MinIO root credentials (25-minio.yaml).
  S3_ACCESS_KEY: replace-me
  S3_SECRET_KEY: replace-me
---
apiVersion: v1
kind: Secret
metadata:
  name: radar-llm-credentials
  namespace: radar-immobilier
type: Opaque
stringData:
  OPENAI_API_KEY: replace-me-if-used
  ANTHROPIC_API_KEY: replace-me-if-used
---
# Sentropic-app auth delegation (OIDC relying party). The client_secret is
# issued when the operator registers radar's oauth_clients row at the sentropic
# IdP (auth.sent-tech.ca); SESSION_SECRET signs radar's OWN RP session cookie.
apiVersion: v1
kind: Secret
metadata:
  name: radar-sentropic-auth
  namespace: radar-immobilier
type: Opaque
stringData:
  SENTROPIC_OAUTH_CLIENT_SECRET: replace-me
  SESSION_SECRET: replace-me
---
# Scraping-document + graphify object store (SCW `radar-immobilier-docs-pocs`).
# Used by worker-live (RECUEIL) and project-graph-from-s3 (graph projection).
# Copy the keys from the SCW console → Object Storage scoped access keys.
apiVersion: v1
kind: Secret
metadata:
  name: radar-scrape-s3-credentials
  namespace: radar-immobilier
type: Opaque
stringData:
  SCRAPE_S3_ENDPOINT: https://s3.fr-par.scw.cloud
  SCRAPE_S3_BUCKET: radar-immobilier-docs-pocs
  SCRAPE_S3_REGION: fr-par
  SCRAPE_S3_ACCESS_KEY: replace-me
  SCRAPE_S3_SECRET_KEY: replace-me
---
# Scaleway TEM API secret key for outbound invitation / enrolment mail.
# SMTP egress (:587) is blocked at the platform level (BR-37b), so the api sends
# mail through the Scaleway Transactional Email HTTP API (X-Auth-Token header);
# the non-secret wiring (SCW_TEM_API_BASE_URL / REGION / PROJECT_ID / FROM_*)
# lives in the 30-api.yaml ConfigMap. Generate this key in the SCW console
# (Transactional Email → API keys) AFTER validating the sent-tech.ca sender
# domain. When this Secret is absent, the api stays in degraded/log mode and the
# admin copies the invitation link from the UI instead.
apiVersion: v1
kind: Secret
metadata:
  name: radar-tem-credentials
  namespace: radar-immobilier
type: Opaque
stringData:
  # SCW TEM API secret key (used as the X-Auth-Token header).
  SCW_TEM_SECRET_KEY: replace-me
---
# Edge BasicAuth htpasswd for the AS-IS private preview (50-ui.yaml nginx
# auth_basic). Keeps immo.sent-tech.ca private while the OIDC RP is wired.
# Create out-of-band, NEVER commit the real hash, e.g.:
#   htpasswd -nbB <user> '<pass>' > /tmp/htpasswd
#   kubectl -n radar-immobilier create secret generic radar-edge-basicauth \
#     --from-file=htpasswd=/tmp/htpasswd
apiVersion: v1
kind: Secret
metadata:
  name: radar-edge-basicauth
  namespace: radar-immobilier
type: Opaque
stringData:
  # Single bcrypt htpasswd line: "<user>:$2y$05$...". Replace out-of-band.
  htpasswd: replace-with-htpasswd-line
---
# SCW Container Registry pull secret (mirrors sentropic-registry). Create with
# `kubectl create secret docker-registry radar-registry-pull ...` rather than
# committing a dockerconfigjson.
apiVersion: v1
kind: Secret
metadata:
  name: radar-registry-pull
  namespace: radar-immobilier
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: replace-with-docker-config-json
