apiVersion: v1
kind: Service
metadata:
  name: radar-postgres
  labels:
    app.kubernetes.io/name: radar-immobilier
    app.kubernetes.io/component: postgres
spec:
  selector:
    app.kubernetes.io/name: radar-immobilier
    app.kubernetes.io/component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: radar-postgres
  labels:
    app.kubernetes.io/name: radar-immobilier
    app.kubernetes.io/component: postgres
spec:
  serviceName: radar-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: radar-immobilier
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: radar-immobilier
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: postgis/postgis:16-3.4
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: radar-db-credentials, key: POSTGRES_USER } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: radar-db-credentials, key: POSTGRES_PASSWORD } }
            - name: POSTGRES_DB
              valueFrom: { secretKeyRef: { name: radar-db-credentials, key: POSTGRES_DB } }
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests: { cpu: 150m, memory: 384Mi }
            limits: { cpu: 600m, memory: 768Mi }
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
