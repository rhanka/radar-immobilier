# 32b-reproject-etape-job.yaml — REPROJECTION ÉTAPE v2.1 SCW → PG.
#
# Variante corrigée de 32-graph-projection-only-job.yaml pour pointer
# GRAPH_S3_* explicitement vers le bucket SCW prod qui contient les graphes
# v2.1 avec le champ `etape` (radar-immobilier-docs-pocs, s3.fr-par.scw.cloud).
#
# PROBLÈME CORRIGÉ :
#   Le job 32 utilisait S3_ACCESS_KEY/S3_SECRET_KEY (clés SCW, ok) mais
#   S3_ENDPOINT=http://radar-minio:9000 (configMap radar-api, mauvais) et
#   radar-scrape-s3-credentials était ABSENT du cluster → le script retombait
#   sur S3_ENDPOINT minio et échouait avec ENOTFOUND radar-immobilier-docs.radar-minio.
#
# SOLUTION : injecter GRAPH_S3_* explicitement (priorité max dans config.ts :
#   GRAPH_S3_* > SCRAPE_S3_* > S3_*).
#   GRAPH_S3_ENDPOINT/BUCKET/REGION/FORCE_PATH_STYLE = valeurs littérales SCW.
#   GRAPH_S3_ACCESS_KEY/SECRET_KEY depuis le secret radar-s3-credentials
#   (clés SCW, commencent par SCWZRFK1…, déjà présentes en cluster).
#
# IMAGE : radar-api:etape-1781485930 (contient api/dist/scripts/project-graph-from-s3.js
#         — build D1 réparé).
#
# GRAPHES DISPONIBLES (vérifiés 2026-06-14) :
#   Bucket radar-immobilier-docs-pocs, endpoint https://s3.fr-par.scw.cloud
#   1009 latest.json, 537 en ontology_version 2.1.
#   120 villes S-Z (E1-E5) ont Signal/DesignationEvent avec etape dans properties
#   (1576/1611 nœuds = 97,8 % != inconnu).
#   E6+ (455 villes S-Z restantes) toujours en v2.0/2.1-sans-etape → ok, upsert
#   idempotent, relancer après chaque lot.
#
# EGRESS RÉSEAU : testé 2026-06-14 — HTTP 200 depuis le cluster vers
#   https://s3.fr-par.scw.cloud. Aucune restriction egress.
#
# JOB IDEMPOTENT : upsert ON CONFLICT — relancer est sûr.
#
# Usage one-shot (toutes les villes) :
#   kubectl apply -f deploy/k8s/32b-reproject-etape-job.yaml -n radar-immobilier
#   kubectl wait job/radar-graph-reproject-etape --for=condition=complete \
#     -n radar-immobilier --timeout=1200s
#   kubectl logs -l job-name=radar-graph-reproject-etape -n radar-immobilier
#   kubectl delete job radar-graph-reproject-etape -n radar-immobilier
#
# Cibler des villes spécifiques (ex. re-run après chaque lot S-Z E6+) :
#   command: ["node", "dist/scripts/project-graph-from-s3.js", "sherbrooke", "ogden"]
apiVersion: batch/v1
kind: Job
metadata:
  name: radar-graph-reproject-etape
  namespace: radar-immobilier
  labels:
    app.kubernetes.io/name: radar-immobilier
    app.kubernetes.io/part-of: sentropic
    app.kubernetes.io/component: graph-projection
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: radar-immobilier
        app.kubernetes.io/component: graph-projection
    spec:
      restartPolicy: Never
      serviceAccountName: radar-app
      containers:
        - name: project-graph
          image: rg.fr-par.scw.cloud/radar-immobilier/radar-api:etape-1781485930
          imagePullPolicy: Always
          workingDir: /workspace/api
          command: ["node", "dist/scripts/project-graph-from-s3.js"]
          envFrom:
            - configMapRef:
                name: radar-api
          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=200 --dns-result-order=ipv4first"
            # ── PG credentials ────────────────────────────────────────────────
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: radar-db-credentials, key: POSTGRES_USER } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: radar-db-credentials, key: POSTGRES_PASSWORD } }
            - name: POSTGRES_DB
              valueFrom: { secretKeyRef: { name: radar-db-credentials, key: POSTGRES_DB } }
            # ── GRAPH_S3_* → SCW prod, bucket graphes v2.1 ───────────────────
            # Court-circuite S3_ENDPOINT=http://radar-minio:9000 (configMap radar-api)
            # et SCRAPE_S3_* (secret radar-scrape-s3-credentials absent du cluster).
            - name: GRAPH_S3_ENDPOINT
              value: "https://s3.fr-par.scw.cloud"
            - name: GRAPH_S3_BUCKET
              value: "radar-immobilier-docs-pocs"
            - name: GRAPH_S3_REGION
              value: "fr-par"
            - name: GRAPH_S3_FORCE_PATH_STYLE
              value: "false"
            - name: GRAPH_S3_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: radar-s3-credentials, key: S3_ACCESS_KEY } }
            - name: GRAPH_S3_SECRET_KEY
              valueFrom: { secretKeyRef: { name: radar-s3-credentials, key: S3_SECRET_KEY } }
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits: { cpu: 150m, memory: 256Mi }
