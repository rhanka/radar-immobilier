# graph-projection-job.yaml — projette les graphes graphify SCW dans Postgres.
#
# Trois étapes dans le même Job (initContainers exécutés dans l'ordre, puis le
# conteneur principal) :
#   1. db-backfill-0004 : insère (idempotent) la ligne de tracking drizzle de la
#                         migration 0004_auth_users appliquée À LA MAIN en prod et
#                         JAMAIS trackée dans __drizzle_migrations. SANS cette étape,
#                         l'étape (2) `migrate` tenterait de REJOUER 0004 et
#                         échouerait (table account_users déjà existante). No-op si
#                         la ligne est déjà là → ré-exécutable sans dégât.
#   2. db-migrate       : applique les migrations Drizzle (idempotent, CREATE IF NOT
#                         EXISTS). workingDir /workspace/api car migrate.js lit
#                         `migrationsFolder: "drizzle"` RELATIF au CWD.
#   3. project-graph    : lit graph/<ville>/latest.json depuis SCW (GRAPH_S3_* →
#                         SCRAPE_S3_*) et appelle upsertGraph pour chaque ville.
#
# Les trois conteneurs partagent l'IMAGE radar-api unique : depuis le fix esbuild
# multi-entryPoints (api/Dockerfile), l'image embarque api/dist/index.js ET
# api/dist/db/migrate.js, api/dist/db/scripts/backfill-0004-tracking.js,
# api/dist/scripts/project-graph-from-s3.js. (Avant le fix, ce dernier était
# ABSENT → MODULE_NOT_FOUND : c'était la douleur D1 « projection PG cassée ».)
#
# Usage one-shot (reprojection des ~1000 graphes v2.1 SCW→PG) :
#   kubectl apply -f deploy/k8s/31-graph-projection-job.yaml -n radar-immobilier
#   kubectl wait job/radar-graph-projection --for=condition=complete -n radar-immobilier --timeout=900s
#   kubectl logs -l job-name=radar-graph-projection -n radar-immobilier
#   kubectl delete job radar-graph-projection -n radar-immobilier
#
# Pour cibler des villes spécifiques, surcharger les args du conteneur
# project-graph via un patch (ou utiliser 32-graph-projection-only-job.yaml).
#
# Variante SANS migrate (DB déjà à jour) : 32-graph-projection-only-job.yaml.
# CronJob de rafraîchissement périodique : 34-projection-cronjob.yaml.
#
# Budget mémoire tenant SERRÉ : api+ui+pg+minio laissent ~256Mi/150m CPU libres.
# requests 96Mi/50m, limits 256Mi/150m, NODE_OPTIONS=--max-old-space-size=200
# (heap V8 plafonné sous la limite conteneur pour éviter l'OOM-kill).
#
# Nota : les secrets S3 sont partagés avec le Deployment radar-api via le
# même Secret radar-s3-credentials / radar-scrape-s3-credentials.
apiVersion: batch/v1
kind: Job
metadata:
  name: radar-graph-projection
  namespace: radar-immobilier
  labels:
    app.kubernetes.io/name: radar-immobilier
    app.kubernetes.io/part-of: sentropic
    app.kubernetes.io/component: graph-projection
spec:
  # Pas de relance automatique : si ça échoue, investiguer avant de relancer.
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: radar-immobilier
        app.kubernetes.io/component: graph-projection
    spec:
      restartPolicy: Never
      serviceAccountName: radar-app
      initContainers:
        # ── Étape 1 : backfill tracking 0004 (AVANT migrate, idempotent) ──────
        - name: db-backfill-0004
          image: rg.fr-par.scw.cloud/radar-immobilier/radar-api:latest
          imagePullPolicy: Always
          workingDir: /workspace/api
          command: ["node", "dist/db/scripts/backfill-0004-tracking.js"]
          envFrom:
            - configMapRef:
                name: radar-api
          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=200 --dns-result-order=ipv4first"
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: radar-db-credentials, key: POSTGRES_USER } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: radar-db-credentials, key: POSTGRES_PASSWORD } }
            - name: POSTGRES_DB
              valueFrom: { secretKeyRef: { name: radar-db-credentials, key: POSTGRES_DB } }
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits: { cpu: 150m, memory: 256Mi }
        # ── Étape 2 : migrations Drizzle ──────────────────────────────────────
        - name: db-migrate
          image: rg.fr-par.scw.cloud/radar-immobilier/radar-api:latest
          imagePullPolicy: Always
          # migrate.js lit `migrationsFolder: "drizzle"` relatif au CWD → /workspace/api
          # où l'image copie api/drizzle/*.sql + meta/_journal.json.
          workingDir: /workspace/api
          command: ["node", "dist/db/migrate.js"]
          envFrom:
            - configMapRef:
                name: radar-api
          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=200 --dns-result-order=ipv4first"
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: radar-db-credentials, key: POSTGRES_USER } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: radar-db-credentials, key: POSTGRES_PASSWORD } }
            - name: POSTGRES_DB
              valueFrom: { secretKeyRef: { name: radar-db-credentials, key: POSTGRES_DB } }
            - name: S3_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: radar-s3-credentials, key: S3_ACCESS_KEY } }
            - name: S3_SECRET_KEY
              valueFrom: { secretKeyRef: { name: radar-s3-credentials, key: S3_SECRET_KEY } }
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits: { cpu: 150m, memory: 256Mi }
      # ── Étape 3 : projection SCW → PG ────────────────────────────────────
      containers:
        - name: project-graph
          image: rg.fr-par.scw.cloud/radar-immobilier/radar-api:latest
          imagePullPolicy: Always
          workingDir: /workspace/api
          command: ["node", "dist/scripts/project-graph-from-s3.js"]
          envFrom:
            - configMapRef:
                name: radar-api
          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=200 --dns-result-order=ipv4first"
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: radar-db-credentials, key: POSTGRES_USER } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: radar-db-credentials, key: POSTGRES_PASSWORD } }
            - name: POSTGRES_DB
              valueFrom: { secretKeyRef: { name: radar-db-credentials, key: POSTGRES_DB } }
            - name: S3_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: radar-s3-credentials, key: S3_ACCESS_KEY } }
            - name: S3_SECRET_KEY
              valueFrom: { secretKeyRef: { name: radar-s3-credentials, key: S3_SECRET_KEY } }
            # Creds SCW pour le bucket radar-immobilier-docs-pocs (SCRAPE_S3_*).
            # Le script project-graph-from-s3.ts lit GRAPH_S3_* puis se rabat
            # sur SCRAPE_S3_* : aucune variable GRAPH_S3_* supplémentaire n'est
            # nécessaire si les SCRAPE_S3_* pointent déjà sur le bon bucket.
            - name: SCRAPE_S3_ENDPOINT
              valueFrom: { secretKeyRef: { name: radar-scrape-s3-credentials, key: SCRAPE_S3_ENDPOINT, optional: true } }
            - name: SCRAPE_S3_BUCKET
              valueFrom: { secretKeyRef: { name: radar-scrape-s3-credentials, key: SCRAPE_S3_BUCKET, optional: true } }
            - name: SCRAPE_S3_REGION
              valueFrom: { secretKeyRef: { name: radar-scrape-s3-credentials, key: SCRAPE_S3_REGION, optional: true } }
            - name: SCRAPE_S3_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: radar-scrape-s3-credentials, key: SCRAPE_S3_ACCESS_KEY, optional: true } }
            - name: SCRAPE_S3_SECRET_KEY
              valueFrom: { secretKeyRef: { name: radar-scrape-s3-credentials, key: SCRAPE_S3_SECRET_KEY, optional: true } }
            - name: SCRAPE_S3_FORCE_PATH_STYLE
              value: "false"
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits: { cpu: 150m, memory: 256Mi }
